spring:
  application:
    name: ai-data-analyst
  config:
    import: classpath:business-metadata.yml
  profiles:
    # 本机开发默认加载 application-local.yml；部署时通过 SPRING_PROFILES_ACTIVE=prod 覆盖。
    default: local
  data:
    redis:
      # 本机通过 VM 网络连接 Redis；可用 REDIS_HOST、REDIS_PORT 环境变量覆盖。
      host: ${REDIS_HOST:192.168.6.7}
      port: ${REDIS_PORT:6379}
      connect-timeout: 2s
      timeout: 2s

server:
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.aianalyst: DEBUG

security:
  jwt:
    issuer: ai-data-analyst
    expiration-seconds: 7200

ai:
  deepseek:
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    api-key: ${DEEPSEEK_API_KEY:}
    model-name: deepseek-v4-pro
    temperature: 0.0
    max-tokens: 2048

knife4j:
  enable: true
  setting:
    language: zh_cn
