spring:
  application:
    name: ai-data-analyst
  config:
    import: classpath:business-metadata.yml
  profiles:
    # 本机开发默认加载 application-local.yml；部署时通过 SPRING_PROFILES_ACTIVE=prod 覆盖。
    default: local
  data:
    redis:
      # 本机通过 VM 网络连接 Redis；可用 REDIS_HOST、REDIS_PORT 环境变量覆盖。
      host: ${REDIS_HOST:192.168.6.7}
      port: ${REDIS_PORT:6379}
      # 业务 Redis 使用 2 号逻辑库，和本机其他学习项目或默认库的数据隔离。
      database: ${REDIS_DATABASE:2}
      connect-timeout: 2s
      timeout: 2s

app:
  conversation:
    #Redis 仅保留活跃的工作数据集；MySQL 仍作为持久化的最终信任源（数据真值）。
    redis-ttl: 2h
    recent-turn-count: 3
    rolling-summary-target-tokens: 1024
  async:
    # Core model work, optional result analysis, and HTTP orchestration must not compete for one pool.
    llm-core:
      core-pool-size: ${LLM_CORE_POOL_SIZE:4}
      max-pool-size: ${LLM_CORE_MAX_POOL_SIZE:6}
      queue-capacity: ${LLM_CORE_QUEUE_CAPACITY:20}
      thread-name-prefix: llm-core-
    llm-analysis:
      core-pool-size: ${LLM_ANALYSIS_POOL_SIZE:1}
      max-pool-size: ${LLM_ANALYSIS_MAX_POOL_SIZE:2}
      queue-capacity: ${LLM_ANALYSIS_QUEUE_CAPACITY:10}
      thread-name-prefix: llm-analysis-
    query-orchestration:
      core-pool-size: ${QUERY_ASYNC_POOL_SIZE:4}
      max-pool-size: ${QUERY_ASYNC_MAX_POOL_SIZE:8}
      queue-capacity: ${QUERY_ASYNC_QUEUE_CAPACITY:50}
      thread-name-prefix: query-orchestration-

server:
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.aianalyst: DEBUG

security:
  jwt:
    issuer: ai-data-analyst
    expiration-seconds: 7200

ai:
  deepseek:
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    api-key: ${DEEPSEEK_API_KEY:}
    model-name: deepseek-v4-pro
    temperature: 0.0
    max-tokens: ${DEEPSEEK_MAX_TOKENS:2048}
    # Keep transport retry independent from the bounded SQL semantic-correction budget.
    timeout: ${DEEPSEEK_TIMEOUT:25s}
    max-retries: ${DEEPSEEK_MAX_RETRIES:0}
    # Keep this aligned with the actual model. The conservative default protects unknown gateways.
    context-window-tokens: ${DEEPSEEK_CONTEXT_WINDOW_TOKENS:32768}
    context-usage-limit: ${DEEPSEEK_CONTEXT_USAGE_LIMIT:0.80}
    token-safety-margin: ${DEEPSEEK_TOKEN_SAFETY_MARGIN:256}

knife4j:
  enable: true
  setting:
    language: zh_cn

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      # 健康检查允许匿名访问时只展示 UP/DOWN，不能泄露数据库、Redis 等内部连接细节。
      show-details: never
