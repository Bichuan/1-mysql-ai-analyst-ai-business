metadata:
  tables:
    - name: biz_customer
      description: 客户信息表
      columns:
        - { name: id, description: 客户ID（主键） }
        - { name: customer_name, description: 客户名称 }
        - { name: customer_level, description: 客户等级（VIP/A/B/C） }
        - { name: region, description: 所在地区 }
        - { name: industry, description: 所属行业 }
        - { name: created_at, description: 注册时间 }
    - name: biz_order
      description: 订单主表
      columns:
        - { name: id, description: 订单ID（主键） }
        - { name: order_no, description: 订单号 }
        - { name: customer_id, description: 客户ID，关联 biz_customer.id }
        - { name: amount, description: 订单金额 }
        - { name: status, description: 订单状态（PAID/SHIPPED/COMPLETED/CANCELLED） }
        - { name: order_date, description: 下单日期 }
    - name: biz_product
      description: 商品信息表
      columns:
        - { name: id, description: 商品ID（主键） }
        - { name: product_name, description: 商品名称 }
        - { name: category, description: 商品分类 }
        - { name: price, description: 标准单价 }
        - { name: stock, description: 库存数量 }
    - name: biz_order_item
      description: 订单明细表
      columns:
        - { name: id, description: 明细ID（主键） }
        - { name: order_id, description: 订单ID，关联 biz_order.id }
        - { name: product_id, description: 商品ID，关联 biz_product.id }
        - { name: quantity, description: 购买数量 }
        - { name: unit_price, description: 成交单价 }
        - { name: subtotal, description: 明细小计 }
  relationships:
    - biz_customer.id = biz_order.customer_id
    - biz_order.id = biz_order_item.order_id
    - biz_product.id = biz_order_item.product_id
  business_terms:
    - term: 销售额
      meaning: biz_order.amount 的 SUM，且 biz_order.status = 'COMPLETED'
    - term: 今年
      meaning: YEAR(biz_order.order_date) = YEAR(CURDATE())
    - term: 有效订单
      meaning: biz_order.status IN ('PAID', 'SHIPPED', 'COMPLETED')
